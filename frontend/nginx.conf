server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    
    location /api/ {
        proxy_pass http://servicio-logistica:4003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/reportes {
        proxy_pass http://servicio-reportes:4001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
