apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistica
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logistica
  template:
    metadata:
      labels:
        app: logistica
    spec:
      containers:
        - name: logistica
          image: sat-logistica:latest
          ports:
            - containerPort: 4003
          envFrom:
            - configMapRef:
                name: sat-config
            - secretRef:
                name: sat-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
