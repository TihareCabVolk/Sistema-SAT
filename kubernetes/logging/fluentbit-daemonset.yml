apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-config
  namespace: sat-qa
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 1
        Log_Level info
        Parsers_File parsers.conf

    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        Parser docker
        Tag kube.*

    [OUTPUT]
        Name es
        Match kube.*
        Host elasticsearch
        Port 9200
        Index sat-logs
        Type _doc
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit
  namespace: sat-qa
spec:
  selector:
    matchLabels:
      app: fluentbit
  template:
    metadata:
      labels:
        app: fluentbit
    spec:
      containers:
        - name: fluentbit
          image: fluent/fluent-bit:3.0
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: varlog
              mountPath: /var/log
      volumes:
        - name: config
          configMap:
            name: fluentbit-config
        - name: varlog
          hostPath:
            path: /var/log
