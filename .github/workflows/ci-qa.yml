name: CI - QA

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  NAMESPACE: sat-qa

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: reportes
            context: backend/servicio-reportes
          - name: logistica
            context: backend/servicio-logistica
          - name: frontend
            context: frontend
          - name: nginx-gateway
            context: nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sat-${{ matrix.service.name }}:qa-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_QA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/ --recursive -n $NAMESPACE

      - name: Update images
        run: |
          kubectl set image deployment/reportes \
            reportes=${{ secrets.DOCKER_USERNAME }}/sat-reportes:qa-latest \
            -n $NAMESPACE
          kubectl set image deployment/logistica \
            logistica=${{ secrets.DOCKER_USERNAME }}/sat-logistica:qa-latest \
            -n $NAMESPACE
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKER_USERNAME }}/sat-frontend:qa-latest \
            -n $NAMESPACE
          kubectl set image deployment/nginx-gateway \
            nginx-gateway=${{ secrets.DOCKER_USERNAME }}/sat-nginx-gateway:qa-latest \
            -n $NAMESPACE

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/reportes -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/logistica -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/frontend -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/nginx-gateway -n $NAMESPACE --timeout=120s
