name: CI/CD - Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Backend Images
        run: |
          for service in reportes validacion logistica; do
            docker build -t ${{ secrets.DOCKER_USERNAME }}/sat-$service:prod-latest backend/servicio-$service
            docker push ${{ secrets.DOCKER_USERNAME }}/sat-$service:prod-latest
          done

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sat-frontend:prod-latest frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/sat-frontend:prod-latest

      - name: Build and Push Nginx Gateway
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sat-nginx-gateway:prod-latest nginx
          docker push ${{ secrets.DOCKER_USERNAME }}/sat-nginx-gateway:prod-latest

      - name: Deploy to KIND (Production)
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          for service in reportes validacion logistica; do
            kubectl set image deployment/$service $service=${{ secrets.DOCKER_USERNAME }}/sat-$service:prod-latest -n sat-prod
          done
          kubectl set image deployment/frontend frontend=${{ secrets.DOCKER_USERNAME }}/sat-frontend:prod-latest -n sat-prod
          kubectl set image deployment/nginx-gateway nginx-gateway=${{ secrets.DOCKER_USERNAME }}/sat-nginx-gateway:prod-latest -n sat-prod
