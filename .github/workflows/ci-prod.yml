name: CI - PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  NAMESPACE: sat-prod

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: reportes
            context: backend/servicio-reportes
          - name: logistica
            context: backend/servicio-logistica
          - name: frontend
            context: frontend
          - name: nginx-gateway
            context: nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sat-${{ matrix.service.name }}:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to PROD
    runs-on: [self-hosted, sat-prod]
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify kubectl and cluster
        run: |
          echo "kubectl: $(kubectl version --client --short 2>/dev/null || kubectl version --client)"
          kubectl cluster-info
          kubectl get ns $NAMESPACE || kubectl create ns $NAMESPACE

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/ --recursive -n $NAMESPACE

      - name: Update images
        run: |
          kubectl set image deployment/reportes \
            reportes=${{ secrets.DOCKER_USERNAME }}/sat-reportes:prod-latest \
            -n $NAMESPACE
          kubectl set image deployment/logistica \
            logistica=${{ secrets.DOCKER_USERNAME }}/sat-logistica:prod-latest \
            -n $NAMESPACE
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKER_USERNAME }}/sat-frontend:prod-latest \
            -n $NAMESPACE
          kubectl set image deployment/nginx-gateway \
            nginx-gateway=${{ secrets.DOCKER_USERNAME }}/sat-nginx-gateway:prod-latest \
            -n $NAMESPACE

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/reportes -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/logistica -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/frontend -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/nginx-gateway -n $NAMESPACE --timeout=120s
